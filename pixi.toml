[workspace]
authors = ["mhyatt000 <mhyatt000@brad.adms.luc.edu>"]
channels = ["robostack-staging", 'robostack', "conda-forge"]
name = "ws"
platforms = [
"linux-64", 
]
version = "0.1.0"

[environments]
default = { features = ["default"]}

[activation.env]
MYVAR = "enabled"

[activation]
scripts = [".pixi.sh"]

# https://pixi.sh/latest/workspace/multi_environment/#real-world-example-use-cases

[tasks]
rqt = { cmd = "ros2 run rqt_image_view rqt_image_view" }
build = {cmd = "cd $PIXI_PROJECT_ROOT && colcon build --cmake-args -DCMAKE_EXE_LINKER_FLAGS=-L$CONDA_PREFIX/lib -DCMAKE_SHARED_LINKER_FLAGS=-L$CONDA_PREFIX/lib -DCMAKE_MODULE_LINKER_FLAGS=-L$CONDA_PREFIX/lib", inputs = ["src"]}
turtle = {cmd =  "ros2 run turtlesim turtlesim_node", inputs = ["src"]}

init = "bash -c 'mkdir -p $PIXI_PROJECT_ROOT/src'"
import = "bash -c 'mkdir -p $PIXI_PROJECT_ROOT/src && vcs import $PIXI_PROJECT_ROOT/src < ${REPOS_FILE:-$PIXI_PROJECT_ROOT/ws.repos}'"
pull = "bash -c 'vcs pull $PIXI_PROJECT_ROOT/src'"
export = "bash -c 'vcs export $PIXI_PROJECT_ROOT/src > ${OUT_FILE:-$PIXI_PROJECT_ROOT/ws.repos}'"
pin = "bash -c 'vcs export --exact $PIXI_PROJECT_ROOT/src > ${OUT_FILE:-$PIXI_PROJECT_ROOT/ws.pinned.repos}'"
status = "bash -c 'vcs status $PIXI_PROJECT_ROOT/src'"
diff = "bash -c 'vcs diff $PIXI_PROJECT_ROOT/src'"
clean = "bash -c 'cd $PIXI_PROJECT_ROOT && rm -rf build install log'"
clean_xnodes = "bash -c 'cd $PIXI_PROJECT_ROOT && rm -rf build/xnodes install/xnodes || true'"

performance = {cmd = "bash -lc 'echo performance | sudo tee /sys/devices/system/cpu/cpu*/cpufreq/scaling_governor'"}
xmove = {cmd = "ros2 launch xarm_moveit_config xarm6_moveit_fake.launch.py", inputs = ["src"]}
xservo = {cmd = "ros2 launch xarm_moveit_servo xarm_moveit_servo_realmove.launch.py dof:=7 robot_ip:=192.168.1.231 add_gripper:=true report_type:=dev"}
xservo-fake = {cmd = "ros2 launch xarm_moveit_servo xarm_moveit_servo_fake.launch.py dof:=7 add_gripper:=true", depends-on = ["build_xarm", "setup"]}
build_rs = { cmd = "bash -lc 'cd $PIXI_PROJECT_ROOT && colcon build --packages-select realsense2_camera_msgs realsense2_camera realsense2_description --cmake-args -DCMAKE_PREFIX_PATH=$CONDA_PREFIX -DCMAKE_EXE_LINKER_FLAGS=-L$CONDA_PREFIX/lib -DCMAKE_SHARED_LINKER_FLAGS=-L$CONDA_PREFIX/lib'" }
rs = { cmd = "ros2 launch realsense2_camera rs_launch.py" }
realsense = { cmd = "ros2 launch realsense2_camera rs_launch.py" }

setup = "bash -lc 'cd $PIXI_PROJECT_ROOT && source install/setup.bash'"
[tasks.test-unit]
cmd = [ "pytest", "-vv",]
cwd = "src/xnodes"
depends-on = [ "build_xnodes", "setup", ]

[tasks.test-integration]
cmd = "bash -lc 'cd $PIXI_PROJECT_ROOT/src/xnodes && source $PIXI_PROJECT_ROOT/install/setup.bash && mkdir -p /tmp/ros_log && pytest -vv -s -rs tests/integration'"
depends-on = [ "build_xnodes", ]

[tasks.test-integration.env]
RCUTILS_LOGGING_SEVERITY = "DEBUG"
ROS_LOCALHOST_ONLY = "1"
ROS_LOG_DIR = "/tmp/ros_log"
RMW_IMPLEMENTATION = "rmw_fastrtps_cpp"
FASTDDS_BUILTIN_TRANSPORTS = "UDPv4"

[tasks.xlaunch]
cmd = "ros2 launch xnodes"
depends-on = [ "build_xnodes", "setup", ]

[tasks.build_xnodes]
cmd = "bash -lc 'cd $PIXI_PROJECT_ROOT && COLCON_LOG_PATH=$HOME/.colcon/log colcon build --packages-select xnodes'"
# clean first: colcon fails with "setup.py develop --uninstall not recognized" when a stale editable install exists (modern setuptools removed that flag)
depends-on = ["clean_xnodes"]

[tasks.init_xarm]
cmd = "git submodule update --init --recursive && git pull --recurse-submodules"
inputs = ["src/xarm_ros2"]
cwd = "src/xarm_ros2"
env = { ARGUMENT = "hello" }

[tasks.build_xarm]
cmd = "bash -lc 'colcon build --base-paths $PIXI_PROJECT_ROOT/src/xarm_ros2 --cmake-clean-cache --cmake-args -DCMAKE_EXE_LINKER_FLAGS=-L$CONDA_PREFIX/lib -DCMAKE_SHARED_LINKER_FLAGS=-L$CONDA_PREFIX/lib -DCMAKE_MODULE_LINKER_FLAGS=-L$CONDA_PREFIX/lib'"
# depends-on = ["init_xarm"]

# ==========
# default
# ==========

[pypi-dependencies]
tyro = "*"
rich = "*"
vcstool = "*"
pupil-apriltags =  "*" 
pydantic = "*"
scipy = ">=1.16.3, <2"
webpolicy = { git = "https://github.com/mhyatt000/webpolicy.git", rev = "master" }
gello = {  git = "https://github.com/mhyatt000/gello_software.git",  rev = "main" }
#gello = {  path = "src/gello" }
pynput = ">=1.8.1, <2"
pyspacemouse = ">=2.0.0, <3"
dynamixel-sdk = ">=4.0.3, <5"
zarr = ">=3.1.5, <4"
mcap-protobuf-support = "*"
foxglove-schemas-protobuf = "*"
numcodecs = ">=0.16.5, <0.17"
opencv-python = "*"

[dependencies]
python = ">=3.11,<3.12"
evdev = "*"
pip = "*"
setuptools = "<60"

# Core ROS
ros-humble-desktop = ">=0.10.0,<0.11"   # includes rviz2, tf2, rosbag2, etc.
# ros-humble-rmw-cyclonedds-cpp = "*"     # rmw backend
# ros-humble-cyclonedds = "*"

# xArm + control stack
ros-humble-ros2-control = "*"
