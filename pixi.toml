# Needed by xarm_ros2
ros-humble-joint-state-publisher = "*"
ros-humble-xacro = "*"
ros-humble-moveit-msgs = "*"            # xArm packages depend on this, even without MoveIt
ros-humble-moveit = "*"
ros-humble-apriltag-msgs = "*"          # only if your workspace references them
apriltag = ">=3.2"
ros-humble-gazebo-ros-pkgs = "*"
gazebo = "*"

# Utilities
colcon-common-extensions = "*"
pkg-config = "*"
cmake = ">=3.22,<4"
ninja = "*"

# Python libs
numpy = ">=1.26.4,<2"
transforms3d = "*"
ros-humble-usb-cam = ">=0.8.1,<0.9"
flax = ">=0.10.4,<0.11"
ros-humble-moveit-servo = ">=2.5.7,<3"
ros-humble-rosbag2-storage-mcap = ">=0.15.13,<0.16"
ros-humble-diagnostic-updater = "*"
ros-humble-generate-parameter-library = "*"
ros-humble-ros-testing = "*"
librealsense = "*"
poco = "*"
ros-humble-foxglove-bridge = ">=0.8.2,<0.9"
